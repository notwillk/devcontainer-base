name: Build, Test, and Push

on:
  push:
    branches:
      - main
  pull_request:

env:
  PUSH_TO_GHCR: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        if: env.PUSH_TO_GHCR == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t devcontainer-base:ci .

      - name: Run tests
        run: docker run --rm --privileged -v "${{ github.workspace }}/test.sh:/test.sh:ro" devcontainer-base:ci bash /test.sh

      - name: Push to GHCR
        if: env.PUSH_TO_GHCR == 'true'
        run: |
          IMAGE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker tag devcontainer-base:ci "${IMAGE}:latest"
          docker tag devcontainer-base:ci "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"
